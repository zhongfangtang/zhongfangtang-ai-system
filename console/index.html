<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中芳堂 · 运营后台 V5.1</title>
<style>
  :root{--bg:#0a0a14;--card:#12121f;--gold:#d4a853;--gold2:#e8c97a;--line:#1e1e36;--txt:#e2e2ec;--mut:#7878a0;--grn:#3fb98a;--red:#e06c6c;--blue:#5b9bd5;--pur:#a78bfa;--pink:#f472b6;--cyan:#22d3ee}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
  a{color:var(--gold2);text-decoration:none}
  .layout{display:flex;min-height:100vh}
  /* Sidebar */
  .sidebar{width:200px;background:linear-gradient(180deg,#0d0d1a,#12121f);border-right:1px solid var(--line);position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:10;transition:width .2s}
  .sidebar .brand{padding:20px 16px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(212,168,83,.08),transparent)}
  .sidebar .brand h2{font-size:17px;color:var(--gold);letter-spacing:1px;display:flex;align-items:center;gap:8px}
  .sidebar .brand small{display:block;color:var(--mut);font-size:10px;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
  .nav-group{padding:8px 0}
  .nav-group .title{padding:8px 16px 4px;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:2px}
  .nav-group a{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--mut);font-size:13px;transition:.15s;border-left:3px solid transparent;text-decoration:none}
  .nav-group a:hover{background:rgba(212,168,83,.06);color:var(--txt)}
  .nav-group a.on{background:rgba(212,168,83,.12);color:var(--gold);border-left-color:var(--gold);font-weight:600}
  .nav-group a .ico{width:18px;text-align:center;font-size:14px}
  .nav-group a .badge-nav{font-size:10px;background:var(--gold);color:#0a0a14;padding:1px 6px;border-radius:8px;margin-left:auto}
  /* Main */
  .main{margin-left:200px;flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(18,18,31,.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;backdrop-filter:blur(10px)}
  .topbar h1{margin:0;font-size:16px;color:var(--txt);font-weight:600}
  .topbar .user{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--mut)}
  .content{padding:20px 24px;flex:1;overflow-y:auto}
  /* Login */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50}
  .login-card{width:360px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .login-card h2{margin:0 0 6px;color:var(--gold);font-size:22px}
  .login-card .sub{color:var(--mut);font-size:12px;margin-bottom:20px}
  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px;transition:border-color .2s}
  .card:hover{border-color:rgba(212,168,83,.2)}
  .card h3{margin:0 0 14px;color:var(--gold2);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
  /* Grids */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  /* Stats */
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}
  .stat-card .num{font-size:30px;font-weight:700;color:var(--gold)}
  .stat-card .lbl{color:var(--mut);font-size:11px;margin-top:4px}
  .stat-card .sub{color:var(--grn);font-size:10px;margin-top:4px}
  /* Form */
  input,select,textarea{width:100%;background:#0a0a18;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,.1)}
  label{display:block;color:var(--mut);font-size:11px;margin:8px 0 3px;font-weight:500}
  /* Buttons */
  .btn{background:var(--gold);color:#0a0a14;border:0;padding:9px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .btn:hover{background:var(--gold2);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent;color:var(--mut);border:1px solid var(--line)}
  .btn.ghost:hover{background:rgba(255,255,255,.04);color:var(--txt)}
  .btn.blue{background:var(--blue);color:#fff}
  .btn.green{background:var(--grn);color:#fff}
  .btn.sm{padding:5px 11px;font-size:11px}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  /* Badges */
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.5px}
  .b-draft{background:rgba(120,120,160,.15);color:#cdd}
  .b-pending{background:rgba(212,168,83,.15);color:var(--gold2)}
  .b-reviewing{background:rgba(91,155,213,.15);color:var(--blue)}
  .b-published,.b-active,.b-running{background:rgba(63,185,138,.15);color:var(--grn)}
  .b-new{background:rgba(120,120,160,.15);color:#cdd}
  .b-contacted{background:rgba(91,155,213,.15);color:var(--blue)}
  .b-converted{background:rgba(63,185,138,.15);color:var(--grn)}
  .b-high{background:rgba(224,108,108,.15);color:var(--red)}
  .b-paused{background:rgba(212,168,83,.15);color:var(--gold2)}
  .b-error{background:rgba(224,108,108,.15);color:var(--red)}
  .b-degraded{background:rgba(167,139,250,.15);color:var(--pur)}
  /* Table */
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;color:var(--mut);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td{padding:9px 12px;border-bottom:1px solid rgba(30,30,54,.5)}
  tr:hover td{background:rgba(212,168,83,.03)}
  /* Row */
  .row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(30,30,54,.5)}
  .row:last-child{border-bottom:0}
  .grow{flex:1;min-width:0}
  .ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta{color:var(--mut);font-size:11px}
  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e36;color:#fff;padding:12px 24px;border-radius:10px;opacity:0;transition:.3s;z-index:100;font-size:13px;border:1px solid var(--line);box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .toast.show{opacity:1}
  .hint{color:var(--mut);font-size:11px;margin-top:6px}
  .pill{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--line)}
  .ok{color:var(--grn)}.err{color:var(--red)}.warn{color:var(--gold2)}
  pre{white-space:pre-wrap;word-break:break-word;background:#0a0a18;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;max-height:300px;overflow:auto}
  /* Utils */
  .mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
  .flex{display:flex}.gap6{gap:6px}.gap10{gap:10px}.gap16{gap:16px}
  .loading{text-align:center;padding:60px;color:var(--mut)}
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:40px;color:var(--mut);font-size:13px}
  /* Responsive */
  @media(max-width:1200px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}}
  @media(max-width:768px){.sidebar{width:60px}.sidebar .brand h2 span,.sidebar .nav-group a span,.sidebar .nav-group .title,.sidebar .brand small{display:none}.main{margin-left:60px}.grid2,.grid3,.grid4{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login">
  <div class="login-card">
    <h2>中芳堂 · 运营后台</h2>
    <div class="sub">V5.1 全域AI智能体 · 一人运营公司</div>
    <label>账号</label><input id="u" value="admin" autocomplete="username">
    <label>密码</label><input id="p" type="password" value="admin123" autocomplete="current-password">
    <button class="btn mt16" style="width:100%;justify-content:center" onclick="doLogin()">登 录</button>
    <div class="hint" id="loginMsg"></div>
  </div>
</div>

<!-- 主框架 -->
<div id="app" class="layout" style="display:none">
  <aside class="sidebar">
    <div class="brand">
      <h2>🌿 <span>中芳堂</span></h2>
      <small>AI Intelligence V5.1</small>
    </div>
    <div class="nav-group">
      <div class="title">核心运营</div>
      <a class="on" data-page="dashboard" onclick="switchPage('dashboard')"><span class="ico">📊</span><span>运营仪表盘</span></a>
      <a data-page="content" onclick="switchPage('content')"><span class="ico">✍️</span><span>内容生产</span></a>
      <a data-page="publish" onclick="switchPage('publish')"><span class="ico">📡</span><span>发布管理</span></a>
      <a data-page="leads" onclick="switchPage('leads')"><span class="ico">🎯</span><span>截流线索</span></a>
      <a data-page="crm" onclick="switchPage('crm')"><span class="ico">👥</span><span>客户CRM</span></a>
    </div>
    <div class="nav-group">
      <div class="title">增长引擎</div>
      <a data-page="video" onclick="switchPage('video')"><span class="ico">🎬</span><span>视频工厂</span></a>
      <a data-page="digitalhuman" onclick="switchPage('digitalhuman')"><span class="ico">🎙️</span><span>AI数字人直播</span><span class="badge-nav">AI智享</span></a>
      <a data-page="geo" onclick="switchPage('geo')"><span class="ico">🔍</span><span>GEO搜索占位</span><span class="badge-nav">SEO</span></a>
      <a data-page="distribution" onclick="switchPage('distribution')"><span class="ico">🔗</span><span>分销裂变</span></a>
      <a data-page="finance" onclick="switchPage('finance')"><span class="ico">💳</span><span>金融服务</span></a>
    </div>
    <div class="nav-group">
      <div class="title">产品资产</div>
      <a data-page="products" onclick="switchPage('products')"><span class="ico">📦</span><span>产品与项目</span></a>
      <a data-page="knowledge" onclick="switchPage('knowledge')"><span class="ico">📚</span><span>知识库</span></a>
    </div>
    <div class="nav-group">
      <div class="title">前沿科技</div>
      <a data-page="metaverse" onclick="switchPage('metaverse')"><span class="ico">🌐</span><span>元宇宙展厅</span><span class="badge-nav">3D</span></a>
      <a data-page="web3" onclick="switchPage('web3')"><span class="ico">⛓️</span><span>Web3存证</span></a>
    </div>
    <div class="nav-group">
      <div class="title">智能体</div>
      <a data-page="agents" onclick="switchPage('agents')"><span class="ico">🤖</span><span>AI智能体</span><span class="badge-nav">10</span></a>
      <a data-page="reports" onclick="switchPage('reports')"><span class="ico">📈</span><span>数据报表</span></a>
    </div>
    <div class="nav-group">
      <div class="title">系统</div>
      <a data-page="settings" onclick="switchPage('settings')"><span class="ico">⚙️</span><span>系统设置</span></a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">运营仪表盘</h1>
      <div class="user">
        <span id="conn" class="pill">连接中…</span>
        <span id="me" style="color:var(--gold)"></span>
        <button class="btn ghost sm" onclick="logout()">退出</button>
      </div>
    </div>
    <div class="content" id="pageContent">
      <div class="loading"><div class="spinner"></div><p style="margin-top:12px">加载中…</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import * as API from './js/api.js';

let TOKEN = localStorage.getItem('zft_token') || '';
let ME = localStorage.getItem('zft_me') || '';
let currentPage = 'dashboard';

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

window.doLogin = async function(){
  const u=document.getElementById('u').value, p=document.getElementById('p').value;
  try{const r=await API.login(u,p);ME=r.data.role||u;localStorage.setItem('zft_me',ME);enter();}
  catch(e){document.getElementById('loginMsg').innerHTML='<span class="err">'+esc(e.message)+'</span>';}
};

window.logout = function(){TOKEN='';ME='';localStorage.clear();location.reload();};

function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('me').textContent=ME;
  checkConn();
  switchPage('dashboard');
}

async function checkConn(){
  try{const {ok}=await API.system.health();const el=document.getElementById('conn');
    if(ok){el.textContent='● 在线';el.className='pill ok';}else{el.textContent='○ 离线';el.className='pill err';}}
  catch(e){document.getElementById('conn').textContent='○ 离线';document.getElementById('conn').className='pill err';}
}

const PAGE_TITLES = {
  dashboard:'📊 运营仪表盘',content:'✍️ 内容生产',publish:'📡 发布管理',leads:'🎯 截流线索',
  crm:'👥 客户CRM',video:'🎬 视频工厂',digitalhuman:'🎙️ AI数字人直播',geo:'🔍 GEO搜索占位',
  distribution:'🔗 分销裂变',finance:'💳 金融服务',products:'📦 产品与项目',knowledge:'📚 知识库',
  metaverse:'🌐 元宇宙展厅',web3:'⛓️ Web3存证',
  agents:'🤖 AI智能体',reports:'📈 数据报表',settings:'⚙️ 系统设置'
};

window.switchPage = async function(page){
  currentPage = page;
  document.querySelectorAll('.nav-group a').forEach(x=>x.classList.toggle('on',x.dataset.page===page));
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  const el = document.getElementById('pageContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">加载中…</p></div>';
  try{
    const mod = await import(`./pages/${page}.js`);
    await mod.render(el);
  }catch(err){
    el.innerHTML = `<div class="card"><h3>页面加载失败</h3><pre>${esc(err.message)}</pre><button class="btn mt12" onclick="switchPage('dashboard')">返回首页</button></div>`;
  }
};

if(TOKEN){enter();} else {document.getElementById('login').style.display='flex';}
</script>
</body>
</html>
