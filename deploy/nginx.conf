# 中芳堂美业全域AI智能体系统 - Nginx 反向代理配置
# 部署路径: /etc/nginx/sites-available/zhongfangtang-ai

# ============ API 服务 ============
server {
    listen 443 ssl http2;
    server_name api.zhongfangtang.com;

    ssl_certificate     /etc/nginx/ssl/api.zhongfangtang.com.pem;
    ssl_certificate_key /etc/nginx/ssl/api.zhongfangtang.com.key;

    client_max_body_size 100M;  # 支持视频上传

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

# ============ BI 数据中台 ============
server {
    listen 443 ssl http2;
    server_name data.zhongfangtang.com;

    ssl_certificate     /etc/nginx/ssl/data.zhongfangtang.com.pem;
    ssl_certificate_key /etc/nginx/ssl/data.zhongfangtang.com.key;

    root /var/www/zhongfangtang-dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ============ HTTP → HTTPS 重定向 ============
server {
    listen 80;
    server_name api.zhongfangtang.com data.zhongfangtang.com;
    return 301 https://$host$request_uri;
}
